<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundCloud Exporter</title>
    <style>
        body { font-family: sans-serif; background-color: #111; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #222; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center; }
        input { padding: 10px; width: 300px; border: none; border-radius: 4px; margin-bottom: 15px; outline: none; }
        button { background: #ff5500; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #e04a00; }
        button:disabled { background: #555; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 0.9rem; color: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h2>SoundCloud Exporter</h2>
        <input type="url" id="profileUrl" placeholder="https://soundcloud.com/username" required />
        <br>
        <button id="exportBtn">Exportieren & Download</button>
        <div id="status"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
